# Iceberg extensions + Hive-backed catalog as the default catalog
spark.sql.extensions                                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog                     org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type                hive
spark.sql.catalog.spark_catalog.uri                 thrift://hive-metastore:9083
spark.sql.catalog.spark_catalog.warehouse           s3a://warehouse/
spark.sql.catalogImplementation                     hive
spark.hive.metastore.uris                           thrift://hive-metastore:9083

# S3A -> MinIO
spark.hadoop.fs.s3a.endpoint                        http://minio:9000
spark.hadoop.fs.s3a.access.key                      admin
spark.hadoop.fs.s3a.secret.key                      password
spark.hadoop.fs.s3a.path.style.access               true
spark.hadoop.fs.s3a.connection.ssl.enabled          false
spark.hadoop.fs.s3a.impl                            org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider        org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# client-mode driver runs inside the airflow-scheduler container;
# workers must be able to reach it back by service name
spark.driver.host                                   airflow-scheduler
spark.driver.bindAddress                            0.0.0.0
spark.sql.shuffle.partitions                        8
spark.serializer                                    org.apache.spark.serializer.KryoSerializer

# bounded resources so the cluster co-exists with the other services on an
# 8GB host (Olist is ~100k rows; these are plenty)
spark.driver.memory                                 1g
spark.executor.memory                               2g
spark.executor.cores                                2
