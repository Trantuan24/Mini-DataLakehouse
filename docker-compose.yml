name: mini-lakehouse

x-spark-env: &spark-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  S3_ENDPOINT: ${S3_ENDPOINT}
  HIVE_METASTORE_URI: ${HIVE_METASTORE_URI}
  ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE}
  SPARK_MASTER_URL: ${SPARK_MASTER_URL}

services:
  # ============================================================
  # 1. POSTGRES - backend for Airflow, Superset, Hive, + source
  # ============================================================
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      HIVE_DB: ${HIVE_DB}
      HIVE_DB_USER: ${HIVE_DB_USER}
      HIVE_DB_PASSWORD: ${HIVE_DB_PASSWORD}
      SUPERSET_DB: ${SUPERSET_DB}
      SOURCE_DB: ${SOURCE_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lakehouse-net

  # ============================================================
  # 2. MINIO - S3-compatible object storage
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lakehouse-net

  # auto-create buckets then exit
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/raw local/bronze local/silver local/gold local/platinum local/warehouse local/meta;
      mc anonymous set download local/raw;
      echo 'Buckets created'; exit 0;
      "
    networks:
      - lakehouse-net

  # ============================================================
  # 3. HIVE METASTORE - Iceberg catalog
  # ============================================================
  hive-metastore:
    build:
      context: ./docker/hive
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_DB: ${HIVE_DB}
      HIVE_DB_USER: ${HIVE_DB_USER}
      HIVE_DB_PASSWORD: ${HIVE_DB_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9083'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - lakehouse-net

  # ============================================================
  # 4. SPARK - master + worker (custom image w/ Iceberg jars)
  # ============================================================
  spark-master:
    build:
      context: ./docker/spark
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_healthy
    environment:
      <<: *spark-env
      SPARK_MODE: master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./pipeline:/opt/pipeline
      - ./dataset:/opt/dataset
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lakehouse-net

  spark-worker:
    build:
      context: ./docker/spark
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *spark-env
      SPARK_MODE: worker
      SPARK_WORKER_MEMORY: 3G
      SPARK_WORKER_CORES: 3
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./pipeline:/opt/pipeline
      - ./dataset:/opt/dataset
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lakehouse-net

  # ============================================================
  # 5. TRINO - SQL query engine over Iceberg
  # ============================================================
  trino:
    image: trinodb/trino:440
    restart: unless-stopped
    depends_on:
      hive-metastore:
        condition: service_healthy
    ports:
      - "8090:8080"
    volumes:
      - ./docker/trino/catalog:/etc/trino/catalog
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - lakehouse-net

  # ============================================================
  # 6. AIRFLOW - orchestration (init + webserver + scheduler)
  # ============================================================
  # one-shot: run DB migration + admin user creation exactly once so the
  # webserver and scheduler never race each other on `airflow db migrate`.
  airflow-init:
    build:
      context: ./docker/airflow
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-common-env
      <<: *spark-env
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SOURCE_DB: ${SOURCE_DB}
    volumes: &airflow-volumes
      - ./dags:/opt/airflow/dags
      - ./pipeline:/opt/pipeline
      - ./dataset:/opt/dataset
      - ./tests:/opt/tests
      - airflow-logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname admin --lastname admin --role Admin \
          --email admin@example.com || true
    networks:
      - lakehouse-net

  airflow-webserver:
    build:
      context: ./docker/airflow
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-volumes
    ports:
      - "8085:8080"
    command: airflow webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - lakehouse-net

  airflow-scheduler:
    build:
      context: ./docker/airflow
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      hive-metastore:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-volumes
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - lakehouse-net

  # ============================================================
  # 7. SUPERSET - BI dashboard
  # ============================================================
  superset:
    build:
      context: ./docker/superset
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_ADMIN: ${SUPERSET_ADMIN}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${SUPERSET_DB}
    volumes:
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py
    ports:
      - "8088:8088"
    networks:
      - lakehouse-net

networks:
  lakehouse-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  airflow-logs:
